# NetBird self-hosted — Management + Signal + Coturn + Dashboard + Zitadel IdP
# PKI integration: TLS certs issued by my-infra cert-manager (Vault → cert-manager → Secret).
# Run cert-export.sh first to extract netbird-tls-secret into ./certs/.
#
# Quickstart:
#   cd my-vpn/netbird
#   cp .env.example .env   # edit NETBIRD_DOMAIN, TURN_PASSWORD
#   bash cert-export.sh    # pull TLS cert from K8s Secret
#   docker compose up -d
#
# Official reference: https://github.com/netbirdio/netbird/blob/main/infrastructure_files/docker-compose.yml

services:
  # --- PostgreSQL (shared by Management + Zitadel) ---
  postgres:
    image: ${MY_POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-netbird}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netbird}
      POSTGRES_MULTIPLE_DATABASES: netbird,zitadel
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-postgres.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netbird"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Zitadel IdP (built-in OIDC provider) ---
  zitadel:
    image: ${MY_ZITADEL_IMAGE:-ghcr.io/zitadel/zitadel:latest}
    restart: unless-stopped
    command: start-from-init --masterkey ${ZITADEL_MASTERKEY:-MasterkeyForDevOnly} --tlsMode external --config /zitadel-config.yaml
    volumes:
      - ./zitadel-config.yaml:/zitadel-config.yaml:ro
      - ./machinekey:/machinekey
      - ./login-client.pat:/login-client.pat
    environment:
      ZITADEL_EXTERNALDOMAIN: ${NETBIRD_DOMAIN}
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNALPORT:-8443}
      ZITADEL_EXTERNALSECURE: "true"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:-NetBirdAdmin123!}
      # Zitadel DB via ZITADEL_DATABASE_POSTGRES_* (v4 native config)
      ZITADEL_DATABASE_POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${ZITADEL_DATABASE:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${POSTGRES_USER:-netbird}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${POSTGRES_USER:-netbird}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_FIRSTINSTANCE_PATPATH: /machinekey/zitadel-admin-sa.token
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: zitadel-admin-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Admin
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_SCOPES: openid
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2030-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: "Login Client"
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2030-01-01T00:00:00Z"
    depends_on:
      postgres:
        condition: service_healthy

  # --- Zitadel Login UI (v4 separate container, port 3000) ---
  zitadel-login:
    image: ${MY_ZITADEL_LOGIN_IMAGE:-ghcr.io/zitadel/zitadel-login:latest}
    restart: unless-stopped
    environment:
      ZITADEL_API_URL: http://zitadel:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /login-client.pat
      CUSTOM_REQUEST_HEADERS: "Host:${NETBIRD_DOMAIN}"
    volumes:
      - ./login-client.pat:/login-client.pat:ro
    depends_on:
      zitadel:
        condition: service_started

  # --- NetBird Management ---
  management:
    image: ${MY_MANAGEMENT_IMAGE:-netbirdio/management:latest}
    restart: unless-stopped
    volumes:
      - netbird-mgmt-data:/var/lib/netbird
      - ./management.json:/etc/netbird/management.json:ro
      - ./certs/tls.crt:/etc/netbird/tls.crt:ro
      - ./certs/tls.key:/etc/netbird/tls.key:ro
    environment:
      NETBIRD_MANAGEMENT_DOMAIN: ${NETBIRD_DOMAIN}
      NETBIRD_SIGNAL_PORT: "10000"
      NETBIRD_SIGNAL_ADDR: ${NETBIRD_DOMAIN}:10000
      NB_DATASTORE_ENCRYPTION_KEY: ${NB_DATASTORE_ENCRYPTION_KEY:-LXqg45oj5CD/zGjbbuAfDhfNUzWLAU1KxyunAayFmY4=}
      NB_STORE_ENGINE_POSTGRES_DSN: postgres://${POSTGRES_USER:-netbird}:${POSTGRES_PASSWORD:-netbird}@postgres:5432/netbird?sslmode=disable
      NETBIRD_STORE_CONFIG_DSN: postgres://${POSTGRES_USER:-netbird}:${POSTGRES_PASSWORD:-netbird}@postgres:5432/netbird?sslmode=disable
      NETBIRD_MANAGEMENT_TURN_PASSWORD: ${TURN_PASSWORD}
      NETBIRD_IDP_MGMT_EXTRA_ADMIN_FULL_NAME: "Platform Admin"
      NETBIRD_MANAGEMENT_TLSCERTFILE: /etc/netbird/tls.crt
      NETBIRD_MANAGEMENT_TLSKEYFILE: /etc/netbird/tls.key
      SSL_CERT_FILE: /etc/netbird/tls.crt
    # Management only serves internal docker network (Caddy or ALB handles TLS).
    # For standalone use without reverse proxy, override with -f docker-compose.standalone.yaml
    ports:
      - "9443:443"
    extra_hosts:
      - "${NETBIRD_DOMAIN}:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      zitadel:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # --- NetBird Signal (WireGuard coordination) ---
  signal:
    image: ${MY_SIGNAL_IMAGE:-netbirdio/signal:latest}
    restart: unless-stopped
    volumes:
      - ./certs/tls.crt:/etc/netbird/tls.crt:ro
      - ./certs/tls.key:/etc/netbird/tls.key:ro
    environment:
      NETBIRD_SIGNAL_TLSCERTFILE: /etc/netbird/tls.crt
      NETBIRD_SIGNAL_TLSKEYFILE: /etc/netbird/tls.key
    ports:
      - "10000:10000"

  # --- Coturn (TURN/STUN relay) ---
  coturn:
    image: ${MY_COTURN_IMAGE:-coturn/coturn:4.6-alpine}
    restart: unless-stopped
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./certs/tls.crt:/etc/coturn/certs/tls.crt:ro
      - ./certs/tls.key:/etc/coturn/certs/tls.key:ro
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "49152-49172:49152-49172/udp"
    network_mode: host

  # --- NetBird Dashboard ---
  dashboard:
    image: ${MY_DASHBOARD_IMAGE:-netbirdio/dashboard:latest}
    restart: unless-stopped
    environment:
      NETBIRD_MGMT_API_ENDPOINT: https://${NETBIRD_DOMAIN}
      NETBIRD_MGMT_GRPC_API_ENDPOINT: https://${NETBIRD_DOMAIN}
    ports:
      - "9080:80"
    depends_on:
      - management

volumes:
  postgres-data:
  netbird-mgmt-data:
