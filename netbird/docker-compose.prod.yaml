# Production overlay for docker-compose.yaml.
# Usage:
#   docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up -d
#
# Changes from base:
#   - Caddy reverse proxy on 80/443 (TLS termination, only public ports)
#   - All other service ports removed (internal Docker network only)
#   - PostgreSQL → external RDS
#   - Resource limits + health checks on all services
#   - json-file logging with rotation on all services
#   - extra_hosts removed (Linux hosts use DNS, not Docker Desktop hacks)

services:
  # ====================================================================
  # Caddy — TLS termination, reverse proxy (ONLY public-facing service)
  # ====================================================================
  caddy:
    image: ${MY_CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs/tls.crt:/etc/caddy/certs/tls.crt:ro
      - ./certs/tls.key:/etc/caddy/certs/tls.key:ro
    environment:
      NETBIRD_DOMAIN: ${NETBIRD_DOMAIN}
    depends_on:
      management:
        condition: service_started
      zitadel:
        condition: service_started
      dashboard:
        condition: service_started
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ====================================================================
  # PostgreSQL — disabled (use RDS)
  # ====================================================================
  postgres:
    deploy:
      replicas: 0

  # ====================================================================
  # Zitadel IdP
  # ====================================================================
  zitadel:
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ====================================================================
  # Zitadel Login UI
  # ====================================================================
  zitadel-login:
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ====================================================================
  # NetBird Management
  # ====================================================================
  management:
    ports: []
    extra_hosts:
      - "${NETBIRD_DOMAIN}:host-gateway"
    environment:
      NB_STORE_ENGINE_POSTGRES_DSN: ${NETBIRD_RDS_DSN}
      NETBIRD_STORE_CONFIG_DSN: ${NETBIRD_RDS_DSN}
      NETBIRD_MANAGEMENT_DEBUG: "false"
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://localhost/api/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  # ====================================================================
  # NetBird Signal
  # ====================================================================
  signal:
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10000"]
      interval: 15s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ====================================================================
  # Coturn TURN/STUN — requires host network for UDP performance
  # ====================================================================
  coturn:
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ====================================================================
  # NetBird Dashboard
  # ====================================================================
  dashboard:
    ports: []
    environment:
      NETBIRD_MGMT_API_ENDPOINT: https://${NETBIRD_DOMAIN}
      NETBIRD_MGMT_GRPC_API_ENDPOINT: https://${NETBIRD_DOMAIN}
      AUTH_AUTHORITY: https://${NETBIRD_DOMAIN}
      AUTH_CLIENT_ID: ${DASHBOARD_CLIENT_ID}
      AUTH_AUDIENCE: ${DASHBOARD_CLIENT_ID}
      NEXT_PUBLIC_AUTH_AUTHORITY: https://${NETBIRD_DOMAIN}
      NEXT_PUBLIC_AUTH_CLIENT_ID: ${DASHBOARD_CLIENT_ID}
      NEXT_PUBLIC_AUTH_AUDIENCE: ${DASHBOARD_CLIENT_ID}
      AUTH_SUPPORTED_SCOPES: openid profile email offline_access
      AUTH_REDIRECT_URI: /nb-auth
      AUTH_SILENT_REDIRECT_URI: /nb-silent-auth
      AUTH_BASE_URL: https://${NETBIRD_DOMAIN}
      AUTH_POST_LOGOUT_REDIRECT_URI: /
      USE_AUTH0: "false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
