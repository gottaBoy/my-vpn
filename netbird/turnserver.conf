# Coturn TURN server config for NetBird
listening-port=3478
tls-listening-port=5349

# Replace with actual server public IP or domain
external-ip=${TURN_EXTERNAL_IP:-127.0.0.1}

realm=${NETBIRD_DOMAIN:-netbird.internal}
server-name=${NETBIRD_DOMAIN:-netbird.internal}

lt-cred-mech
user=netbird:${TURN_PASSWORD}

# TLS certs (same as NetBird Management — cert-manager issued)
cert=/etc/coturn/certs/tls.crt
pkey=/etc/coturn/certs/tls.key

# Performance tuning
min-port=49152
max-port=49172
verbose
no-cli
