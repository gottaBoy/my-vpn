# Zitadel config for NetBird IdP.
# All secrets are injected via environment variables — do NOT hardcode passwords.
# Reference: https://zitadel.com/docs/self-hosting/manage/configure

FirstInstance:
  Org:
    Human:
      UserName: netbird-admin
      # Password is set via env var ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD
      LoginName:
        UserName: netbird-admin
    MachineKeyPath: /zitadel/admin-key.json
  InstanceName: NetBird
  DefaultLanguage: en

Database:
  postgres:
    Host: ${POSTGRES_HOST}
    Port: 5432
    Database: zitadel
    User:
      Username: ${POSTGRES_USER}
      Password: ${POSTGRES_PASSWORD}
    Admin:
      Username: ${POSTGRES_USER}
      Password: ${POSTGRES_PASSWORD}

Projections:
  Customizations:
    Notifications:
      Enabled: false
